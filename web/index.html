<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pipiple — Le jeu de mots 🚽</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚽</text></svg>">
</head>
<body>
    <div id="app">
        <header class="Header">
            <div class="title">
                <h1 id="game-title">Pipiple</h1>
                <span class="logo" id="game-logo">🚽</span>
            </div>
            <span class="subheader" id="subheader"></span>
            <div class="header-buttons">
                <button id="btn-mode" title="Changer de mode">🎨</button>
                <button id="btn-help" title="Comment jouer">❓</button>
                <button id="btn-yesterday" title="Hier">📅</button>
                <button id="btn-stats" title="Statistiques">📊</button>
            </div>
        </header>

        <main class="GameArea">
            <div class="ScrollContainer" id="ScrollContainer">
                <div class="RowContainer" id="RowContainer"></div>
            </div>
            <div class="ErrorMessage" id="ErrorMessage"></div>
            <div class="Keyboard" id="Keyboard"></div>
        </main>

        <div class="EmojiRain" id="EmojiRain"></div>
    </div>

    <!-- Mode Picker Modal -->
    <div class="Modal hide" id="modal-mode">
        <div class="ModalBackdrop"></div>
        <div class="ModalContent">
            <h1 class="ModalTitle">Choisir un mode</h1>
            <button class="ModalCloseButton">✕</button>
            <div class="ModeGrid" id="mode-grid">
                <button class="ModeCard" data-mode="pipi">
                    <span class="ModeEmoji">🚽</span>
                    <span class="ModeName">Pipiple</span>
                    <span class="ModeDesc">Mode clair</span>
                </button>
                <button class="ModeCard" data-mode="caca">
                    <span class="ModeEmoji">💩</span>
                    <span class="ModeName">Cacaple</span>
                    <span class="ModeDesc">Mode sombre</span>
                </button>
                <button class="ModeCard" data-mode="vomi">
                    <span class="ModeEmoji">🤮</span>
                    <span class="ModeName">Vomiple</span>
                    <span class="ModeDesc">Mode toxique</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Help Modal -->
    <div class="Modal hide" id="modal-help">
        <div class="ModalBackdrop"></div>
        <div class="ModalContent">
            <h1 class="ModalTitle">Comment jouer</h1>
            <button class="ModalCloseButton">✕</button>
            <div class="Intro" id="help-body">
            </div>
        </div>
    </div>

    <!-- Stats Modal -->
    <div class="Modal hide" id="modal-stats">
        <div class="ModalBackdrop"></div>
        <div class="ModalContent">
            <h1 class="ModalTitle">Résultats</h1>
            <button class="ModalCloseButton">✕</button>
            <div id="stats-content"></div>
        </div>
    </div>

    <!-- Yesterday Modal -->
    <div class="Modal hide" id="modal-yesterday">
        <div class="ModalBackdrop"></div>
        <div class="ModalContent">
            <h1 class="ModalTitle" id="yesterday-title">Hier</h1>
            <button class="ModalCloseButton">✕</button>
            <div id="yesterday-content"></div>
        </div>
    </div>

    <script type="module" src="game.js"></script>
</body>
</html>
